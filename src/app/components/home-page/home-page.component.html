<ng-container *transloco="let t; prefix: 'jet-home-page'">
  <jet-page
    [seoDescription]="t('seo.description')"
    [seoKeywords]="t('seo.keywords')"
    [seoTitle]="t('seo.title')"
    [toolbarTitle]="t('toolbar-title')"
  >
    <section class="home-hero jet-flexc-centered">
      <mat-icon
        aria-hidden="true"
        class="home-logo"
        svgIcon="logo"
      />
      <h1 class="home-title">{{ t('app-name') }}</h1>
      <p class="home-tagline">{{ t('tagline') }}</p>
      <p class="home-description">{{ t('description') }}</p>
      <div class="home-actions">
        <a
          color="primary"
          mat-flat-button
          [routerLink]="['/chat']"
        >
          {{ t('open-chat') }}
        </a>
      </div>
    </section>
  </jet-page>
</ng-container>
